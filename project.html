<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project Details - Jim Din</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#1a1a1a',
              secondary: '#2d2d2d',
              accent: '#3b82f6'
            }
          }
        }
      }
    </script>
  </head>
  <body class="bg-primary text-white min-h-screen">
    <div id="particles-js" class="fixed inset-0 z-0"></div>
    <div id="app" class="relative z-10">
      <!-- Header -->
      <header class="py-8">
        <div class="container mx-auto px-4">
          <a href="/" class="text-2xl font-bold hover:text-accent transition-colors">← Back to Home</a>
        </div>
      </header>

      <!-- Project Content -->
      <main class="container mx-auto px-4 py-8">
        <div id="project-content" class="max-w-4xl mx-auto">
          <!-- Content will be dynamically inserted here -->
        </div>
      </main>

      <!-- Footer -->
      <footer class="py-8 mt-16 border-t border-secondary">
        <div class="container mx-auto px-4 text-center">
          <p>&copy; 2025 Jim Din (xjmd)</p>
        </div>
      </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script type="module" src="/project.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        particlesJS('particles-js', {
          particles: {
            number: { value: 100, density: { enable: true, value_area: 800 } },
            color: { value: '#3b82f6' },
            shape: { type: 'circle' },
            opacity: { value: 0.3, random: true },
            size: { value: 4, random: true },
            line_linked: {
              enable: true,
              distance: 150,
              color: '#3b82f6',
              opacity: 0.2,
              width: 1
            },
            move: {
              enable: true,
              speed: 1,
              direction: 'none',
              random: true,
              straight: false,
              out_mode: 'out',
              bounce: false
            }
          },
          interactivity: {
            detect_on: 'canvas',
            events: {
              onhover: { enable: true, mode: 'grab' },
              onclick: { enable: true, mode: 'push' },
              resize: true
            },
            modes: {
              grab: { distance: 140, line_linked: { opacity: 0.5 } },
              push: { particles_nb: 4 }
            }
          },
          retina_detect: true
        });
      });
    </script>
  </body>
</html>
